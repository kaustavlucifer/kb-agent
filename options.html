<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KB Agent — Settings</title>
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/app.css">
  <style>
    body { background: var(--bg); padding: 32px; }
    .settings { max-width: 560px; margin: 0 auto; }
    .settings h1 { font-size: var(--text-xl); margin-bottom: var(--space-xl); }
    .section-title { font-size: var(--text-base); font-weight: var(--weight-semibold); color: var(--text-primary); margin: var(--space-xl) 0 var(--space-md); padding-bottom: var(--space-sm); border-bottom: 1px solid var(--border); }
    .section-title:first-child { margin-top: 0; }
    .field { margin-bottom: var(--space-lg); }
    .field label { display: block; font-size: var(--text-sm); font-weight: var(--weight-medium); color: var(--text-secondary); margin-bottom: var(--space-sm); }
    .field select, .field input[type="number"] { width: 100%; padding: var(--space-md); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: var(--text-base); background: var(--surface); box-sizing: border-box; }
    .field .help { font-size: 11px; color: var(--text-muted); margin-top: 4px; line-height: 1.4; }
    .actions { display: flex; gap: var(--space-md); margin-top: var(--space-2xl); flex-wrap: wrap; }
    #status { margin-top: var(--space-lg); font-size: var(--text-sm); }
  </style>
</head>
<body>
<div class="settings">
  <h1>KB Agent Settings</h1>
  <div class="card">
    <div class="field">
      <label for="token">AI Gateway Token</label>
      <input type="password" id="token" class="input" placeholder="Paste gateway token…" autocomplete="off">
    </div>

    <div class="section-title">Models per action</div>
    <div id="models"></div>

    <div class="section-title">Thresholds &amp; tuning</div>
    <div id="thresholds"></div>

    <div class="field" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border);">
      <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
        <input type="checkbox" id="bypass-guard-rails" style="width: 16px; height: 16px;">
        <span>Bypass case guard rails (Gov/Premier/Non-Hyperforce)</span>
      </label>
      <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px; padding-left: 24px;">
        When enabled, allows analysis of restricted-tier cases (Gov Cloud, EU/US Premier, US Signature, Non-Hyperforce). Use only when authorized — case content will be sent to the AI gateway.
      </div>
    </div>
    <div class="actions">
      <button class="btn btn--primary" id="save-btn">Save</button>
      <button class="btn btn--secondary" id="test-btn">Test Connection</button>
      <button class="btn btn--ghost" id="reset-btn">Reset Defaults</button>
      <button class="btn btn--ghost" id="clear-btn">Clear Cache</button>
    </div>
    <div id="status"></div>
  </div>
</div>
<script type="module" src="options.js"></script>
</body>
</html>
